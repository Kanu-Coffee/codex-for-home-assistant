---
name: Build app

"on":
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      publish:
        required: true
        type: boolean

jobs:
  prepare:
    name: Prepare
    if: github.repository == 'Kanu-Coffee/codex-for-home-assistant'
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      image_name: ${{ steps.normalize.outputs.image_name }}
      name: ${{ steps.normalize.outputs.name }}
      description: ${{ steps.normalize.outputs.description }}
      url: ${{ steps.normalize.outputs.url }}
      registry_prefix: ${{ steps.normalize.outputs.registry_prefix }}
      version: ${{ steps.normalize.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Get app information
        id: info
        uses: home-assistant/actions/helpers/info@f4ca6f671bd429efb108c0f2fa0ae8af0215986c
        with:
          path: "./${{ inputs.app }}"

      - name: Normalize app information
        id: normalize
        env:
          APP_DESCRIPTION: ${{ fromJSON(steps.info.outputs.description) }}
          APP_IMAGE: ${{ fromJSON(steps.info.outputs.image) }}
          APP_NAME: ${{ fromJSON(steps.info.outputs.name) }}
          APP_URL: ${{ fromJSON(steps.info.outputs.url) }}
          APP_VERSION: ${{ fromJSON(steps.info.outputs.version) }}
        run: |
          for variable in \
            APP_DESCRIPTION APP_IMAGE APP_NAME APP_URL APP_VERSION; do
            value="${!variable}"
            if [[ "$value" == *$'\n'* || "$value" == *$'\r'* ]]; then
              echo "App metadata must not contain newlines: ${variable}" >&2
              exit 1
            fi
          done

          {
            printf 'image_name=%s\n' "${APP_IMAGE##*/}"
            printf 'registry_prefix=%s\n' "${APP_IMAGE%/*}"
            printf 'version=%s\n' "$APP_VERSION"
            printf 'name=%s\n' "$APP_NAME"
            printf 'description=%s\n' "$APP_DESCRIPTION"
            if [[ -n "$APP_URL" && "$APP_URL" != "null" ]]; then
              printf 'url=%s\n' "$APP_URL"
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Prepare build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.06.0
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: ${{ steps.normalize.outputs.image_name }}
          registry-prefix: ${{ steps.normalize.outputs.registry_prefix }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ github.token }}
          context: "./${{ inputs.app }}"
          image: ${{ matrix.image }}
          image-tags: ${{ needs.prepare.outputs.version }}
          labels: |
            io.hass.type=app
            io.hass.name=${{ needs.prepare.outputs.name }}
            io.hass.description=${{ needs.prepare.outputs.description }}
            ${{ needs.prepare.outputs.url && format('io.hass.url={0}', needs.prepare.outputs.url) || '' }}
          push: ${{ inputs.publish }}
          version: ${{ needs.prepare.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs:
      - prepare
      - build
    if: inputs.publish
    runs-on: ubuntu-latest
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.06.0
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          container-registry-password: ${{ github.token }}
          image-name: ${{ needs.prepare.outputs.image_name }}
          image-tags: ${{ needs.prepare.outputs.version }}
          registry-prefix: ${{ needs.prepare.outputs.registry_prefix }}
