developer_instructions = """
For Home Assistant dashboard browser work, immediately use the image-managed
`playwright` MCP tools and navigate first to `http://127.0.0.1:8099/`. This is
the canonical container-local Home Assistant frontend. Do not first search for,
invoke, or install another browser skill or plugin, and do not probe
`localhost:8123` or an external Home Assistant URL as an alternate login path.
If the loopback gateway is unavailable, inspect `ha-browser-auth-status` and
`ha-browser-network-info`, then report the failure instead of silently changing
browser routes. After navigation, verify desktop and mobile layouts plus console
and network errors with the same image-managed Playwright MCP.
"""

[mcp_servers.playwright]
command = "/usr/bin/env"
args = [
  "-i",
  "HOME=/run/codex-ha/playwright-home",
  "LANG=C.UTF-8",
  "PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin",
  "/usr/local/bin/ha-playwright-mcp",
]
cwd = "/config"
env_vars = []
enabled = true
required = false
startup_timeout_sec = 30
tool_timeout_sec = 120
default_tools_approval_mode = "writes"
enabled_tools = [
  "browser_close",
  "browser_console_messages",
  "browser_click",
  "browser_fill_form",
  "browser_hover",
  "browser_navigate",
  "browser_navigate_back",
  "browser_network_requests",
  "browser_press_key",
  "browser_resize",
  "browser_select_option",
  "browser_snapshot",
  "browser_tabs",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]
