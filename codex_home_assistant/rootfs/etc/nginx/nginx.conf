worker_processes 1;
error_log /dev/stderr notice;
pid /run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  access_log /dev/stdout;
  server_tokens off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 7681;

    # Home Assistant Supervisor Ingress gateway and local health checks only.
    allow 172.30.32.2;
    allow 127.0.0.1;
    allow ::1;
    deny all;

    location / {
      proxy_pass http://127.0.0.1:7682;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }
  }

  # Private browser-only gateway. Every Home Assistant path goes directly to
  # Core so its own dedicated user token and permissions remain authoritative.
  server {
    listen 127.0.0.1:8099;
    server_name localhost;
    access_log off;

    resolver 127.0.0.11 valid=30s ipv6=off;

    location = /api/websocket {
      include /run/codex-ha/home-assistant-render-upstream.conf;
      proxy_pass $ha_frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host homeassistant;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For "";
      proxy_set_header X-Real-IP "";
      proxy_set_header Forwarded "";
      proxy_ssl_server_name on;
      proxy_ssl_name homeassistant;
      proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
      proxy_ssl_verify on;
      proxy_buffering off;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    location /api/ {
      include /run/codex-ha/home-assistant-render-upstream.conf;
      proxy_pass $ha_frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host homeassistant;
      proxy_set_header X-Forwarded-For "";
      proxy_set_header X-Real-IP "";
      proxy_set_header Forwarded "";
      proxy_ssl_server_name on;
      proxy_ssl_name homeassistant;
      proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
      proxy_ssl_verify on;
      proxy_buffering off;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }

    location / {
      include /run/codex-ha/home-assistant-render-upstream.conf;
      proxy_pass $ha_frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host homeassistant;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For "";
      proxy_set_header X-Real-IP "";
      proxy_set_header Forwarded "";
      proxy_ssl_server_name on;
      proxy_ssl_name homeassistant;
      proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
      proxy_ssl_verify on;
      proxy_redirect off;
      proxy_buffering off;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }
  }
}
